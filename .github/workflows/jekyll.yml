name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: Genealogie_des_Dieux_grecs

      - name: Build Jekyll
        working-directory: Genealogie_des_Dieux_grecs
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Copy root files to site
        run: |
          cp index.html Genealogie_des_Dieux_grecs/_site/index.html
          cp hero.jpg Genealogie_des_Dieux_grecs/_site/hero.jpg
          cp favicon.ico Genealogie_des_Dieux_grecs/_site/favicon.ico
          cp genealogie-des-divinites-grecques.html Genealogie_des_Dieux_grecs/_site/genealogie-des-divinites-grecques.html
          cp -r images Genealogie_des_Dieux_grecs/_site/images

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Genealogie_des_Dieux_grecs/_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
