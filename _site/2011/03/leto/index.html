<p><strong>Léto</strong> est une Divinité sans rôle précis, première femme supposée de Zeus selon certains, pour d’autre c’est <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/metis/" title="Métis">Métis</a>. Elle aurait eu des rivalités avec <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/hera/" title="Héra">Héra</a>, l’officielle de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a>. Elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/pheobe/" title="Phœbe">Phœbe</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/coeos/" title="Coéos">Coéos</a> et la mère d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/artemis/" title="Artémis">Artémis</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/apollon/" title="Apollon">Apollon</a> (des jumeaux).</p>
