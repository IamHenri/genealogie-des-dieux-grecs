<p><strong>Astéria</strong>, titanide qui serait à l’origine de l’ile de Délos, s’étant transformée en caille pour échapper à <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a>. Elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/pheobe/" title="Pheobe">Pheobe</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/coeos/" title="Coéos">Coéos</a>.</p>
