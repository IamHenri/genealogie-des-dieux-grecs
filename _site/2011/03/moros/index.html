<p><strong>Moros</strong> : Dieu de la mort violente, du destin fatal ou du sort implacable, il accompagne souvent ses sœurettes, les <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/keres/" title="Les Kères">Kères</a>, sur les champs de bataille. Fils de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/nyx/" title="Nyx">Nyx</a>.</p>
