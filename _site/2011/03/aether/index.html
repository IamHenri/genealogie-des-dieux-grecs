<p><strong>AEther</strong> personnifie le Ciel dans ses parties supérieures où l’air y est plus pur et plus chaud. Il est respiré par les <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/category/les-divinites-grecques/dieux-et-deesses/" title="Les Dieux et les Déesses">Dieux</a>. Il est le fils de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/nyx/" title="Nyx">Nyx </a>et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/erebe/" title="Erèbe">Erèbe</a>.</p>
