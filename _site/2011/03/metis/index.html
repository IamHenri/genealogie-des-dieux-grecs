<p><strong>Métis</strong> est une Océanide, c’est un puis de savoir, incarnant la ruse. Elle est une des filles d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/ocean/" title="Océan">Océan</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/thetys/" title="Téthys">Téthys</a>. Elle est à la base la mère d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/athena/" title="Athéna">Athéna</a>. Sachant que <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a> l’a avalé pour contrer de mauvais augures, c’est lui qui accouche d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/athena/" title="Athéna">Athéna</a>, par le crâne, fendu par <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/hephaistos/" title="Héphaïstos Mythologie grecque">Héphaïstos</a>.</p>
