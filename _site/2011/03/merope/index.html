<p>Elle est l’une des sept <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/pleiades/" title="Les Pléiades">Pléiades</a>, mère de Sisyphe, le pauvre mec qui est encore en train de pousser son rocher, grand mère du héros <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/bellerophon/">Bellérophon</a>. Fille d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/atlas/" title="Atlas">Atlas</a> et Pléioné, elle est la grand mère d’un des plus grands héros de la mythologie grecque: <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/bellerophon/">Bellérophon</a>.</p>
