<p>Calliope est la Muse de la poésie épique et de l’éloquence. A priori c’est la boss des muses. Comme toutes ses congénères, elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/mnemosyne/" title="Mnémosyne">Mnémosyne</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a>. Elle serait la mère avec un roi Thrace d’Orphée et avec un fleuve des Sirènes.</p>
