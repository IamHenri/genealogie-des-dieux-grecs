<p><strong>Hypérion</strong>, un <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/category/titan/" title="Titan">Titan</a>, il est le Soleil au zénith, celui qui est au-dessus. Nom maintes fois exploité tant en littérature qu’en informatique ou en science fiction. Encore un des enfants de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/gaia/" title="Gaïa ">Gaïa </a>et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/ouranos/" title="Ouranos">Ouranos</a>, il a une descendance avec <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/theia/" title="Théia">Théia</a>.</p>
