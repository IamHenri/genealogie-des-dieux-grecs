<p><strong>Séléné</strong>: Déesse de la pleine Lune, on lui compte trois amoureux en tout: <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a>, <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/pan/" title="Pan">Pan </a>et Endymion, un mortel, alors roi d’Elide, région située à l’est du Péloponnèse. Le nom de cette déesse a engendré celui des Sélénites, les habitants de la lune. Elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/theia/" title="Théia ">Théia </a>et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/hyperion/" title="Hypérion">Hypérion</a>.</p>
