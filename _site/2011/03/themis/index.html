<p><strong>Thémis</strong>, Titanide qui aurait eu une descendance de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a>. Elle est la grand mère des <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/les-hommes/" title="Les Hommes">hommes</a>. Elle représente la justice, la loi, l’Équité. Elle est représentée comme encore aujourd’hui, avec une balance, un glaive et un bandeau. Elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/gaia/" title="Gaïa">Gaïa</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/ouranos/" title="Ouranos">Ouranos</a>, elle est la mère du titan <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/atlas/" title="Atlas">Atlas</a>.</p>
