<p>Erato est la Muse de la Poésie Lyrique et érotique. Comme toutes les muses elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/mnemosyne/" title="Mnémosyne">Mnémosyne</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a>.</p>
