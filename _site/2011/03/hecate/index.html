<p><strong>Hécate</strong>, cette déesse est la fille d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/asteria/" title="Astéria">Astéria</a>, elle est très appréciée de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a>. Pas au sens ou il la baise, mais dans un sens plus divin (pour une fois): il lui donne un pouvoir protecteur. Elle est au coté des orateurs ou des guerriers, aide les navigateurs, prend soin des troupeaux avec <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/hermes/" title="Hermès">Hermès</a>.</p>
