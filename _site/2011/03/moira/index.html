<p><strong>Moïra</strong> est une Divinité personnifiant la destinée. Elle n’a pas de visage, et est le destin. Elle s’impose aux dieux et à tous. Elle provient des mythes homériques. Hésiode considère les <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/moires/" title="Moires">Moires</a>, les tisseuses du destin. Encore une fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/nyx/" title="Nyx">Nyx</a>.</p>
