<p><strong>Uranie</strong> est la <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/category/les-divinites-grecques/nymphes/muse/" title="Les Muses">Muse</a> de l’Astronomie et de l’Astrologie, fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/mnemosyne/" title="Mnémosyne">Mnémosyne</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a>.</p>
