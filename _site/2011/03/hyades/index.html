<p>Les Hyades sont les nymphes des pluies du printemps à l’origine. Une constellation éponyme est visible dans le ciel à l’époque de l’arrivée des pluies en novembre. Elles sont les sœurs des <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/pleiades/" title="Les Pléiades">Pléiades</a>, filles de Pléioné, une <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/category/les-divinites-grecques/nymphes/oceanide/" title="Océanides">Océanide</a>, et d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/atlas/" title="Atlas">Atlas</a>.</p>
