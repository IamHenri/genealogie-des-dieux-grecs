<p><strong>Dolos</strong>: Un Dieu mineur représentant la duperie, la supercherie, la tromperie, la ruse, la fourberie, la perfidie et la traitrise. Un mec cool en somme!!! Ses frères et sœurs sont à son image. Il est le fils de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/nyx/" title="Nyx">Nyx</a>.</p>
