<p><strong>Hébé</strong>: Déesse de la Jeunesse, la Vitalité et la Vigueur des jeunes et protectrice des jeunes mariés. Elle est pas mal priée et citée dans une multitude d’ouvrages. Fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/hera/" title="Héra">Héra</a>, sœur de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/ares/" title="Ares">Arès</a>, <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/ilithye/" title="Ilithye">Ilithye</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/hephaistos/" title="Héphaïstos">Héphaïstos</a>.</p>
