<p><strong>Héraclès</strong> est certainement le plus célèbre des <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/category/les-divinites-grecques/heros/" title="Héros de la mythologie grecque">héros</a> grecs. Il est notamment connu pour avoir effectué 12 travaux. Il se distingue de ses homologues par la multiplicité de ses exploits. Il est le fils de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/zeus/" title="Zeus">Zeus</a> et Alcmène.</p>
