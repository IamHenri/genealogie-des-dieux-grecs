<p><strong>Phorcys</strong> est une <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/category/les-divinites-grecques/primordial/" title="divinité primordiale">divinité primordiale</a>, un monstre des mers qui engendre des être du même genre. Fil de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/pontos/" title="Pontos">Pontos</a> il est le père des <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/les-gorgones/" title="Gorgones">gorgones</a>, Sthéno, Euryale et Méduse. [caption id=”attachment_606” align=”aligncenter” width=”610”]<img src="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/wp-content/uploads/phorcys.jpg" alt="Phorcys et Céto" /> Phorcys et Céto<br />
Musée du Bardo à Tunis[/caption]</p>
