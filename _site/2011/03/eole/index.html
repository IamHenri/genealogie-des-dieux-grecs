<p><strong>Eole</strong>, le Dieu du vent, il file un coup de main à Ulysse selon Homère. rien de très marquant dans son histoire. Il ne glandait pas sur l’Olympe, mais dans son palais en Eolie… Il est le fils de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/poseidon/" title="Poséidon">Poséidon</a>. C’est le père de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/sisyphe/" title="Sisyphe">Sisyphe</a>, avec Enarété.</p>
