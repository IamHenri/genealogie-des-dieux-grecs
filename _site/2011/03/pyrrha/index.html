<p>Pyrrha est la fille d’un Titan, <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/epimethee/" title="Epiméthée">Epiméthée</a> et de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/pandore/" title="Pandore">Pandore</a>, seule survivante du Déluge avec son mec, <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/deucalion/" title="Deucalion">Deucalion</a>.</p>
