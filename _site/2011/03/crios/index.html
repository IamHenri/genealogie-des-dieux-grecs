<p><strong>Crios</strong> est un Titan qui a le même sort que ses comparses, il finit dans le Tartare. Son nom signifie le leader, ou le commandeur. Fils d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/ouranos/" title="Ouranos ">Ouranos </a>et de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/gaia/" title="Gaïa">Gaïa</a>.</p>
