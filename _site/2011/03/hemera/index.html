<p><strong>Héméra</strong> est la Déesse du jour, qu’elle personnifie, ne possédant pas d’allure anthropomorphe. Elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/nyx/" title="Nyx">Nyx </a>et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/erebe/" title="Erèbe">Erèbe</a>. Elle n’a vraisemblablement aucune descendance.</p>
