<p><strong>Clyméné</strong> est une Océanide qui est passée dans diverses plumards selon les auteurs, dans celui de Zeus d’après Hygin, ou encore <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/japet/" title="Japet">Japet</a> et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/helios/" title="Hélios">Hélios</a> a priori selon Hésiode. Elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/thetys/" title="Téthys">Téthys</a>, et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/ocean/" title="Océan">Océan</a>, sœur de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/metis/" title="Métis">Métis</a> et Pléioné. Une des première nanas libre et indépendante!</p>
