<p><strong>Ceto</strong> est un gros monstre marin, une divinité primordiale. Elle engendre avec son frère ( <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/phorcys/" title="Phorcys">Phorcys </a>) des monstres des mers, les <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/les-gorgones/" title="gorgones">gorgones</a>.</p>
