<p><strong>Théia</strong> est une Titanide connue pour être la mère d’<a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/helios/" title="Hélios">Hélios</a>, <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/selene/" title="Séléné ">Séléné </a>et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/eos/" title="Eos">Eos</a>. Elle est la fille de <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/gaia/" title="Gaïa ">Gaïa </a>et <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/ouranos/" title="Ouranos">Ouranos</a>. Comme tant d’autres. Sa progéniture provient de son union avec son frère <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/hyperion/" title="Hypérion">Hypérion</a>.</p>
