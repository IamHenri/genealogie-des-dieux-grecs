<p><strong>Thanatos</strong>: Dieu de la Mort, fils de la <a href="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/2011/03/nyx/" title="Nyx">Nuit</a> et <a href="/2011/03/erebe/">Erèbe</a>, il a sa piaule dans le Tartare, après le Styx, juste à l’ouest des Enfers. C’est le premier ghetto de l’histoire de l’humanité. [caption id=”attachment_727” align=”aligncenter” width=”150”]<img src="http://www.genealogiedesdieuxgrecs.com/Genealogie_des_Dieux_grecs/wp-content/uploads/Column_temple_Artemis_Ephesos_BM_Sc1206_n3-150x300.jpg" alt="Thanatos " /><a href="https://en.wikipedia.org/wiki/Thanatos">Source</a>[/caption]</p>
