title: Généalogie des Dieux Grecs
description: "La généalogie des divinités de la mythologie grecque"
baseurl: "/genealogie-des-dieux-grecs/Genealogie_des_Dieux_grecs"
url: "https://iamhenri.github.io"

# Permalinks - CRITIQUE : conserver les URLs WordPress
permalink: /:year/:month/:slug/

# Pages
include:
  - _pages

# Collections et posts
paginate: 10
paginate_path: "/page/:num/"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

# Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - inputs/
  - README.md
  - "*.sh"
