<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{{ '/Genealogie_des_Dieux_grecs/' | relative_url }}">⚡ Généalogie des Dieux Grecs</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
              Les Divinités
            </a>
            <ul class="dropdown-menu dropdown-menu-dark">
              <li><a class="dropdown-item" href="{{ '/Genealogie_des_Dieux_grecs/categories/les-divinites-grecques/' | relative_url }}">Toutes les divinités</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="{{ '/Genealogie_des_Dieux_grecs/categories/dieux-et-deesses/' | relative_url }}">Dieux et Déesses</a></li>
              <li><a class="dropdown-item" href="{{ '/Genealogie_des_Dieux_grecs/categories/primordial/' | relative_url }}">Divinités primordiales</a></li>
              <li><a class="dropdown-item" href="{{ '/Genealogie_des_Dieux_grecs/categories/heros/' | relative_url }}">Héros</a></li>
            </ul>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="/lien-vers-page-genealogie-FULL">Généalogie</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{{ '/Genealogie_des_Dieux_grecs/articles/' | relative_url }}">Tous les articles</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{{ '/Genealogie_des_Dieux_grecs/categories/mythes-et-legendes/' | relative_url }}">Mythes et Légendes</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{{ '/Genealogie_des_Dieux_grecs/contenu-du-site/' | relative_url }}">Le site</a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="bg-dark text-light py-4 mt-5">
    <div class="container text-center">
      <p class="mb-0">© {{ site.time | date: "%Y" }} Généalogie des Dieux Grecs</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
